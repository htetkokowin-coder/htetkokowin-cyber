<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Photo Gallery - CSS Slideshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #6a8dff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }
        
        .slideshow-container {
            width: 100%;
            height: 700px;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            margin-bottom: 20px;
        }
        
        .slides {
            width: 600%;
            height: 100%;
            display: flex;
            animation: slide-animation 50s infinite linear;
        }
        
        .slide {
            width: 16.66%;
            height: 100%;
            position: relative;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        
        .slide-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        
        /* Animation for 6 images */
@keyframes slide-animation {
    0%, 13% { transform: translateX(0); }
    16.66%, 29.66% { transform: translateX(-16.6666666667%); }
    33.33%, 46.33% { transform: translateX(-33.3333333333%); }
    50%, 63% { transform: translateX(-50%); }
    66.66%, 79.66% { transform: translateX(-66.6666666667%); }
    83.33%, 96.33% { transform: translateX(-83.3333333333%); }
    100% { transform: translateX(-83.3333333333%); }
}        
        .info-box {
            background-color: rgba(40, 40, 40, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .info-box p {
            margin: 5px 0;
        }
        
        .highlight {
            color: #6a8dff;
            font-weight: bold;
        }
        
        /* Responsive design */
        @media (max-width: 600px) {
            .slideshow-container {
                height: 600px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 450px) {
            .slideshow-container {
                height: 500px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .info-box {
                font-size: 0.9rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Portrait Photo Gallery</h1>
        
        <div class="slideshow-container">
            <div class="slides">
                <!-- Portrait Image 1 -->
                <div class="slide">
                    <img src=".\images\r1.jpg" alt="Portrait 1">
                    <div class="slide-number">1</div>
                </div>
                
                <!-- Portrait Image 2 -->
                <div class="slide">
                    <img src=".\images\r2.jpg" alt="Portrait 2">
                    <div class="slide-number">2</div>
                </div>
                
                <!-- Portrait Image 3 -->
                <div class="slide">
                    <img src=".\images\r3.jpg" alt="Portrait 3">
                    <div class="slide-number">3</div>
                </div>
                
                <!-- Portrait Image 4 -->
                <div class="slide">
                    <img src=".\images\r4.jpg" alt="Portrait 4">
                    <div class="slide-number">4</div>
                </div>
                
                <!-- Portrait Image 5 -->
                <div class="slide">
                    <img src=".\images\r5.jpg" alt="Portrait 5">
                    <div class="slide-number">5</div>
                </div>
                
                <!-- Portrait Image 6 -->
                <div class="slide">
                    <img src=".\images\r6.jpg" alt="Portrait 6">
                    <div class="slide-number">6</div>
                </div>
                </div>
        
        
        </div>
    </div>
</body>
</html>
