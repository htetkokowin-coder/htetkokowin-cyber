<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landscape Gallery - 6 Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #6ac9ff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }
        
        .badge {
            background-color: #2a4a6a;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 1rem;
            font-weight: bold;
        }
        
        .slideshow-container {
            width: 100%;
            height: 500px;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            border: 3px solid #3a4a6a;
        }
        
        .slides {
            width: 600%;
            height: 100%;
            display: flex;
            animation: slide-animation-6 60s infinite linear;
        }
        
        .slide {
            width: 16.6666666667%;
            height: 100%;
            position: relative;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .slide-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid #6ac9ff;
        }
        
        .slide-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 20px 15px 15px;
            text-align: left;
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        /* Animation for 6 landscape images */
        @keyframes slide-animation-6 {
            0%, 15% { transform: translateX(0); }
            16.66%, 31.66% { transform: translateX(-16.6666666667%); }
            33.33%, 48.33% { transform: translateX(-33.3333333333%); }
            50%, 65% { transform: translateX(-50%); }
            66.66%, 81.66% { transform: translateX(-66.6666666667%); }
            83.33%, 98.33% { transform: translateX(-83.3333333333%); }
            100% { transform: translateX(-83.3333333333%); }
        }
        
        .info-box {
            background: linear-gradient(145deg, #1e2a3a, #1a1f2a);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.6;
            border-left: 5px solid #6ac9ff;
            text-align: left;
        }
        
        .info-box p {
            margin: 8px 0;
        }
        
        .highlight {
            color: #6ac9ff;
            font-weight: bold;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            background-color: #3a4a6a;
            border-radius: 50%;
            display: inline-block;
        }
        
        /* Responsive design */
        @media (max-width: 700px) {
            .slideshow-container {
                height: 400px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 500px) {
            .slideshow-container {
                height: 300px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .slide-caption {
                font-size: 0.9rem;
                padding: 15px 10px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌄 Landscape Gallery</h1>
        <div class="badge">横６枚</div>
        
        <div class="slideshow-container">
            <div class="slides">
                <!-- Landscape Image 1 -->
                <div class="slide">
                    <img src=".\images\lb1.jpg" alt="Landscape 1" onerror="this.src='https://via.placeholder.com/800x500?text=Landscape+1'">
                    <div class="slide-number">1</div>
                    <div class="slide-caption">大きな仏像を製作する場所</div>
                </div>
                
                <!-- Landscape Image 2 -->
                <div class="slide">
                    <img src=".\images\lb2.jpg" alt="Landscape 2" onerror="this.src='https://via.placeholder.com/800x500?text=Landscape+2'">
                    <div class="slide-number">2</div>
                    <div class="slide-caption">山の上で絵を描いている女性</div>
                </div>
                
                <!-- Landscape Image 3 -->
                <div class="slide">
                    <img src=".\images\lb3.png" alt="Landscape 3" onerror="this.src='https://via.placeholder.com/800x500?text=Landscape+3'">
                    <div class="slide-number">3</div>
                    <div class="slide-caption">ある寺に入り口</div>
                </div>
                
                <!-- Landscape Image 4 -->
                <div class="slide">
                    <img src=".\images\lb4.jpg" alt="Landscape 4" onerror="this.src='https://via.placeholder.com/800x500?text=Landscape+4'">
                    <div class="slide-number">4</div>
                    <div class="slide-caption">お坊さんにご飯を寄進する</div>
                </div>
                
                <!-- Landscape Image 5 -->
                <div class="slide">
                    <img src=".\images\lb5.jpg" alt="Landscape 5" onerror="this.src='https://via.placeholder.com/800x500?text=Landscape+5'">
                    <div class="slide-number">5</div>
                    <div class="slide-caption">田舎の子供たち</div>
                </div>
                
                <!-- Landscape Image 6 -->
                <div class="slide">
                    <img src=".\images\lb6.jpg" alt="Landscape 6" onerror="this.src='https://via.placeholder.com/800x500?text=Landscape+6'">
                    <div class="slide-number">6</div>
                    <div class="slide-caption">太陽の下</div>
                </div>
            </div>
        </div>
        
        <div class="pagination">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        
        <div class="info-box">
            <p><span class="highlight">✨ CSS Animation</span> で作成した横の画像Slideshow</p>
            <p>画像 <span class="highlight">６枚</span> • JavaScript <span class="highlight">絶対使ってない</span></p>
			<p>⏱️ 一枚に１０秒。合計６０秒</p>
        </div>
    </div>
</body>
</html>
