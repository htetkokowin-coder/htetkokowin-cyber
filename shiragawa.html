<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Single Row Image Gallery</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .gallery {
      max-width: 700px;
      margin: 40px auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding: 0 16px;
    }

    .item {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .item img {
      width: 100%;
      border-radius: 6px;
      object-fit: cover;
      display: block;
    }

    /* Ratio control */
    .ratio-4-3 {
      aspect-ratio: 4 / 3;
    }

    .ratio-3-4 {
      aspect-ratio: 1/ 1;
    }

    .caption {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="gallery">

    <div class="item">
      <img src="images/s1.png" class="ratio-4-3">
      <div class="caption">ShiRaGaWa</div>
    </div>

    <div class="item">
      <img src="images/s4.png" class="ratio-4-3">
      <div class="caption">ShiRaGaWa</div>
    </div>

    <div class="item">
      <img src="images/s2.png" class="ratio-3-4">
      <div class="caption">ShiRaGaWa</div>
    </div>

    <div class="item">
      <img src="images/s3.png" class="ratio-3-4">
      <div class="caption">ShiRaGaWa</div>
    </div>

  </div>

</body>
</html>
