<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Photo Gallery - CSS Slideshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #6a8dff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }
        
        .slideshow-container {
            width: 100%;
            height: 700px;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            margin-bottom: 20px;
        }
        
        .slides {
            width: 1200%;
            height: 100%;
            display: flex;
            animation: slide-animation 80s infinite linear;
        }
        
        .slide {
            width: 8.3333333333%;
            height: 100%;
            position: relative;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        
        .slide-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        
        /* Animation for 12 portrait images */
        @keyframes slide-animation {
            0%, 7.5% { transform: translateX(0); }
            8.33%, 15.83% { transform: translateX(-8.3333333333%); }
            16.66%, 24.16% { transform: translateX(-16.6666666667%); }
            25%, 32.5% { transform: translateX(-25%); }
            33.33%, 40.83% { transform: translateX(-33.3333333333%); }
            41.66%, 49.16% { transform: translateX(-41.6666666667%); }
            50%, 57.5% { transform: translateX(-50%); }
            58.33%, 65.83% { transform: translateX(-58.3333333333%); }
            66.66%, 74.16% { transform: translateX(-66.6666666667%); }
            75%, 82.5% { transform: translateX(-75%); }
            83.33%, 90.83% { transform: translateX(-83.3333333333%); }
            91.66%, 99.16% { transform: translateX(-91.6666666667%); }
            100% { transform: translateX(-91.6666666667%); }
        }
        
        .info-box {
            background-color: rgba(40, 40, 40, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .info-box p {
            margin: 5px 0;
        }
        
        .highlight {
            color: #6a8dff;
            font-weight: bold;
        }
        
        /* Responsive design */
        @media (max-width: 600px) {
            .slideshow-container {
                height: 600px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 450px) {
            .slideshow-container {
                height: 500px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .info-box {
                font-size: 0.9rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Portrait Photo Gallery</h1>
        
        <div class="slideshow-container">
            <div class="slides">
                <!-- Portrait Image 1 -->
                <div class="slide">
                    <img src=".\images\image (1).jpg" alt="Portrait 1">
                    <div class="slide-number">1</div>
                </div>
                
                <!-- Portrait Image 2 -->
                <div class="slide">
                    <img src=".\images\image (2).jpg" alt="Portrait 2">
                    <div class="slide-number">2</div>
                </div>
                
                <!-- Portrait Image 3 -->
                <div class="slide">
                    <img src=".\images\Image (3).jpg" alt="Portrait 3">
                    <div class="slide-number">3</div>
                </div>
                
                <!-- Portrait Image 4 -->
                <div class="slide">
                    <img src=".\images\Image (4).jpg" alt="Portrait 4">
                    <div class="slide-number">4</div>
                </div>
                
                <!-- Portrait Image 5 -->
                <div class="slide">
                    <img src=".\images\Image (5).jpg" alt="Portrait 5">
                    <div class="slide-number">5</div>
                </div>
                
                <!-- Portrait Image 6 -->
                <div class="slide">
                    <img src=".\images\Image (6).jpg" alt="Portrait 6">
                    <div class="slide-number">6</div>
                </div>
                
                <!-- Portrait Image 7 -->
                <div class="slide">
                    <img src=".\images\Image (7).jpg" alt="Portrait 7">
                    <div class="slide-number">7</div>
                </div>
                
                <!-- Portrait Image 8 -->
                <div class="slide">
                    <img src=".\images\Image (8).jpg" alt="Portrait 8">
                    <div class="slide-number">8</div>
                </div>
                
                <!-- Portrait Image 9 -->
                <div class="slide">
                    <img src=".\images\Image (9).jpg" alt="Portrait 9">
                    <div class="slide-number">9</div>
                </div>
                
                <!-- Portrait Image 10 -->
                <div class="slide">
                    <img src=".\images\Image (10).jpg" alt="Portrait 10">
                    <div class="slide-number">10</div>
                </div>
                
                <!-- Portrait Image 11 -->
                <div class="slide">
                    <img src=".\images\Image (11).jpg" alt="Portrait 11">
                    <div class="slide-number">11</div>
                </div>
                
                <!-- Portrait Image 12 -->
                <div class="slide">
                    <img src=".\images\Image (13).jpg" alt="Portrait 12">
                    <div class="slide-number">12</div>
                </div>
            </div>
        </div>
        
        <div class="info-box">
            <p><span class="highlight">CSS Animation</span> で作成した Portrait Slideshow</p>
            <p>画像<span class="highlight">１２枚</span> • JavaScript <span class="highlight">絶対使ってない</span></p>
            <p>一枚１２秒• 合計１４４秒</p>
        </div>
    </div>
</body>
</html>
