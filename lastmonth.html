<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポートレート写真ギャラリー - CSSスライドショー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #6a8dff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }
        
        .slideshow-container {
            width: 100%;
            height: 700px;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            margin-bottom: 20px;
        }
        
        .slides {
            width: 400%;
            height: 100%;
            display: flex;
            animation: slide-animation 32s infinite linear;
        }
        
        .slide {
            width: 25%;
            height: 100%;
            position: relative;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        
        .slide-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes slide-animation {
            0%, 22.5% { transform: translateX(0); }
            25%, 47.5% { transform: translateX(-25%); }
            50%, 72.5% { transform: translateX(-50%); }
            75%, 97.5% { transform: translateX(-75%); }
            100% { transform: translateX(-75%); }
        }
        
        .info-box {
            background-color: rgba(40, 40, 40, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .info-box p {
            margin: 5px 0;
        }
        
        .highlight {
            color: #6a8dff;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            .slideshow-container {
                height: 600px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 450px) {
            .slideshow-container {
                height: 500px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .info-box {
                font-size: 0.9rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ポートレート写真ギャラリー</h1>
        
        <div class="slideshow-container">
            <div class="slides">
                <div class="slide">
                    <img src=".\images\image-11.jpg" alt="ポートレート 1">
                    <div class="slide-number">1</div>
                </div>
                
                <div class="slide">
                    <img src=".\images\image-12.jpg" alt="ポートレート 2">
                    <div class="slide-number">2</div>
                </div>
                
                <div class="slide">
                    <img src=".\images\Image-13.jpg" alt="ポートレート 3">
                    <div class="slide-number">3</div>
                </div>
                
                <div class="slide">
                    <img src=".\images\Image-14.jpg" alt="ポートレート 4">
                    <div class="slide-number">4</div>
                </div>
            </div>
        </div>
        
        <div class="info-box">
            <p><span class="highlight">CSSアニメーション</span>で作成したポートレートスライドショー</p>
            <p>画像<span class="highlight">4枚</span> • JavaScript <span class="highlight">完全不使用</span></p>
            <p>1枚あたり8秒 • 合計32秒</p>
        </div>
    </div>
</body>
</html>
