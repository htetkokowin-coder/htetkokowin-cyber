<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動くドットをクリック！シンプルゲーム</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Hiragino Sans', 'Meiryo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #0ea5e9;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        header .subtitle {
            font-size: 1.2rem;
            color: #cbd5e1;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-box {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 150px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .info-box h3 {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .timer, .score, .target {
            font-size: 3rem;
            font-weight: bold;
        }

        .timer {
            color: #10b981;
        }

        .score {
            color: #fbbf24;
        }

        .target {
            color: #8b5cf6;
        }

        .game-instructions {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-instructions h3 {
            color: #0ea5e9;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
        }

        .game-instructions p {
            margin-bottom: 10px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .highlight {
            color: #fbbf24;
            font-weight: bold;
        }

        .game-area {
            position: relative;
            width: 100%;
            height: 400px;
            background-color: rgba(15, 23, 42, 0.9);
            border-radius: 15px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 3px solid #334155;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #dot {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #f87171, #dc2626);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.5);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.2s;
        }

        #dot:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .start-btn {
            background: linear-gradient(to right, #10b981, #059669);
            color: white;
        }

        .start-btn:hover {
            background: linear-gradient(to right, #059669, #047857);
            transform: translateY(-3px);
        }

        .restart-btn {
            background: linear-gradient(to right, #8b5cf6, #7c3aed);
            color: white;
        }

        .restart-btn:hover:not(:disabled) {
            background: linear-gradient(to right, #7c3aed, #6d28d9);
            transform: translateY(-3px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        #message {
            min-height: 60px;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(30, 41, 59, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-history {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-history h3 {
            color: #0ea5e9;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
        }

        #history {
            background-color: rgba(15, 23, 42, 0.7);
            border-radius: 10px;
            padding: 15px;
            min-height: 100px;
            color: #cbd5e1;
        }

        #history p {
            text-align: center;
            padding: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
            width: 100%;
            max-width: 800px;
        }

        footer i {
            color: #ef4444;
            margin: 0 5px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            .game-info {
                flex-direction: column;
                align-items: center;
            }
            
            .info-box {
                width: 100%;
            }
            
            .game-area {
                height: 300px;
            }
            
            #dot {
                width: 60px;
                height: 60px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }

        /* Animation for dot click */
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .clicked {
            animation: pulse 0.3s ease;
        }

        /* History item styles */
        .history-item {
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .history-item.win {
            border-left: 4px solid #10b981;
        }
        
        .history-item.lose {
            border-left: 4px solid #ef4444;
        }

        /* Timer warning animation */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .time-warning {
            animation: blink 0.5s infinite alternate;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-gamepad"></i> 動くドットをクリック！</h1>
            <p class="subtitle">動き回るドットをクリックして高得点を目指そう</p>
        </header>
        
        <div class="game-info">
            <div class="info-box">
                <h3><i class="fas fa-clock"></i> 残り時間</h3>
                <div id="timer" class="timer">30</div>
            </div>
            
            <div class="info-box">
                <h3><i class="fas fa-star"></i> スコア</h3>
                <div id="score" class="score">0</div>
            </div>
            
            <div class="info-box">
                <h3><i class="fas fa-bullseye"></i> 目標</h3>
                <div id="target" class="target">10</div>
            </div>
        </div>
        
        <div class="game-instructions">
            <h3><i class="fas fa-info-circle"></i> ゲームの遊び方</h3>
            <p>30秒以内にドットを<span class="highlight">10回</span>クリックしてください。</p>
            <p>ドットは様々な場所に移動します。素早くクリックしましょう！</p>
        </div>
        
        <div class="game-area">
            <div id="dot" class="dot"></div>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn start-btn">
                <i class="fas fa-play"></i> ゲームスタート
            </button>
            <button id="restartBtn" class="btn restart-btn" disabled>
                <i class="fas fa-redo"></i> もう一度遊ぶ
            </button>
        </div>
        
        <div id="message" class="message">
            「ゲームスタート」ボタンをクリックして開始してください
        </div>
        
        <div class="game-history">
            <h3><i class="fas fa-history"></i> スコア履歴</h3>
            <div id="history" class="history-list">
                <p>ゲームを開始してください...</p>
            </div>
        </div>
    </div>
    
    <footer>
        <p>HTML、CSS、JavaScriptで作成されたシンプルなゲーム</p>
        <p>Made with <i class="fas fa-heart"></i> for Japanese players</p>
    </footer>
    
    <script>
        // ゲーム変数
        let score = 0;
        let timeLeft = 30;
        const targetClicks = 10;
        let gameActive = false;
        let timerInterval = null;
        let dotMoveInterval = null;
        const gameHistory = [];

        // DOM要素
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const targetElement = document.getElementById('target');
        const dotElement = document.getElementById('dot');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const messageElement = document.getElementById('message');
        const historyElement = document.getElementById('history');
        const gameArea = document.querySelector('.game-area');

        // ゲーム初期化
        function initGame() {
            score = 0;
            timeLeft = 30;
            scoreElement.textContent = score;
            timerElement.textContent = timeLeft;
            targetElement.textContent = targetClicks;
            timerElement.classList.remove('time-warning');
            timerElement.style.color = '#10b981';
            
            // ドットの位置をリセット
            moveDotToRandomPosition();
            
            // ボタンの状態を設定
            startBtn.disabled = false;
            restartBtn.disabled = true;
            
            // メッセージをリセット
            messageElement.textContent = '「ゲームスタート」ボタンをクリックして開始してください';
            messageElement.style.color = '#0ea5e9';
            
            // 履歴表示を更新
            updateHistoryDisplay();
        }

        // ドットをランダムな位置に移動
        function moveDotToRandomPosition() {
            if (!gameArea) return;
            
            const gameAreaRect = gameArea.getBoundingClientRect();
            const dotSize = 70;
            
            // ドットのサイズを考慮した最大位置を計算
            const maxX = gameAreaRect.width - dotSize;
            const maxY = gameAreaRect.height - dotSize;
            
            // ランダムな位置を生成
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            // 位置を適用
            dotElement.style.left = `${randomX}px`;
            dotElement.style.top = `${randomY}px`;
        }

        // ゲーム開始
        function startGame() {
            if (gameActive) return;
            
            gameActive = true;
            score = 0;
            timeLeft = 30;
            scoreElement.textContent = score;
            timerElement.textContent = timeLeft;
            timerElement.classList.remove('time-warning');
            timerElement.style.color = '#10b981';
            
            // ドットの位置をリセット
            moveDotToRandomPosition();
            
            // ボタンの状態を設定
            startBtn.disabled = true;
            restartBtn.disabled = false;
            
            // メッセージを更新
            messageElement.textContent = 'ドットをできるだけ早くクリックしてください！';
            messageElement.style.color = '#fbbf24';
            
            // タイマーを開始
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            
            // ドットを1.5秒ごとに移動
            clearInterval(dotMoveInterval);
            dotMoveInterval = setInterval(moveDotToRandomPosition, 1500);
        }

        // タイマー更新
        function updateTimer() {
            timeLeft--;
            timerElement.textContent = timeLeft;
            
            // 残り時間が少なくなったら警告表示
            if (timeLeft <= 10) {
                timerElement.style.color = '#ef4444';
                timerElement.classList.add('time-warning');
            }
            
            // 時間切れでゲーム終了
            if (timeLeft <= 0) {
                endGame(false);
            }
        }

        // ドットクリック処理
        function handleDotClick() {
            if (!gameActive) return;
            
            // クリックアニメーション
            dotElement.classList.add('clicked');
            setTimeout(() => {
                dotElement.classList.remove('clicked');
            }, 300);
            
            // スコアを増加
            score++;
            scoreElement.textContent = score;
            
            // ドットを新しい位置に移動
            moveDotToRandomPosition();
            
            // 目標達成を確認
            if (score >= targetClicks) {
                endGame(true);
            }
        }

        // ゲーム終了
        function endGame(isWin) {
            gameActive = false;
            
            // インターバルをクリア
            clearInterval(timerInterval);
            clearInterval(dotMoveInterval);
            
            // ボタンの状態を設定
            startBtn.disabled = false;
            restartBtn.disabled = true;
            
            // タイマーの警告表示をリセット
            timerElement.classList.remove('time-warning');
            
            // ゲーム結果を表示
            let resultMessage = '';
            let resultColor = '';
            
            if (isWin) {
                resultMessage = `おめでとうございます！目標を達成しました。スコア: ${score}`;
                resultColor = '#10b981';
            } else {
                resultMessage = `時間切れです。あなたのスコア: ${score} (目標: ${targetClicks})`;
                resultColor = '#ef4444';
            }
            
            messageElement.textContent = resultMessage;
            messageElement.style.color = resultColor;
            
            // ゲーム履歴に追加
            const gameResult = {
                score: score,
                target: targetClicks,
                time: new Date().toLocaleTimeString('ja-JP'),
                won: isWin
            };
            
            gameHistory.push(gameResult);
            updateHistoryDisplay();
        }

        // 履歴表示を更新
        function updateHistoryDisplay() {
            if (gameHistory.length === 0) {
                historyElement.innerHTML = '<p>ゲームを開始してください...</p>';
                return;
            }
            
            let historyHTML = '';
            
            // 最新5件のゲームを表示
            const recentGames = gameHistory.slice(-5).reverse();
            
            recentGames.forEach((game, index) => {
                const gameNumber = gameHistory.length - index;
                const resultText = game.won ? '成功' : '失敗';
                const resultClass = game.won ? 'win' : 'lose';
                
                historyHTML += `
                    <div class="history-item ${resultClass}">
                        <p>ゲーム ${gameNumber}: ${game.time} - スコア: ${game.score}/${game.target} - ${resultText}</p>
                    </div>
                `;
            });
            
            historyElement.innerHTML = historyHTML;
        }

        // イベントリスナーを設定
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        dotElement.addEventListener('click', handleDotClick);

        // ページ読み込み時にゲームを初期化
        window.addEventListener('load', () => {
            initGame();
        });

        // タッチ対応（モバイルデバイス用）
        dotElement.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleDotClick();
        });
    </script>
</body>
</html>
